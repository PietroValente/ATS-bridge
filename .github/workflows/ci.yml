name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -r push_data_manager/requirements.txt
          pip install -r talent_pool/requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_adapter_normalize.py \
            tests/test_changed_fields.py \
            -v
